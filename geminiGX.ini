[custom]
enable_rule_generator=true
overwrite_original_rules=true

; 区域优选组
custom_proxy_group=🇹🇼 台湾节点`url-test`(?i)Taiwan|TW`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)Hong Kong|HK`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)United States|US`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🚀 全部节点`select`.*

; 业务精准分流
custom_proxy_group=🧠 Gemini`select`[]🇺🇸 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点
custom_proxy_group=📸 Meta 业务`select`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点
custom_proxy_group=🎬 YouTube`select`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点

; 规则集 (保持优先级顺序)
ruleset=🧠 Gemini,[]GEOSITE,gemini
ruleset=🧠 Gemini,[]DOMAIN-KEYWORD,generativelanguage
ruleset=📸 Meta 业务,[]GEOSITE,instagram
ruleset=📸 Meta 业务,[]GEOSITE,facebook
ruleset=📸 Meta 业务,[]DOMAIN-SUFFIX,threads.net
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
ruleset=🚀 全部节点,[]FINAL
